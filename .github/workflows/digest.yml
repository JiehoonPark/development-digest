name: FE 데일리 리포트

on:
  schedule:
    # UTC 23:00 (월~금) = KST 08:00
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN 모드 (true/false)"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

# deploy-web.yml 과 gh-pages 쓰기 직렬화.
concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install pipeline dependencies
        run: npm ci

      - name: Install web dependencies
        run: npm ci
        working-directory: web

      - name: Install yt-dlp
        run: pip install yt-dlp

      # YT_COOKIES 시크릿(Netscape cookies.txt 형식)이 있으면 yt-dlp 봇차단 우회에 사용
      - name: Write YouTube cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s' "$YT_COOKIES" > "$RUNNER_TEMP/yt-cookies.txt"
            echo "YT_COOKIES_FILE=$RUNNER_TEMP/yt-cookies.txt" >> "$GITHUB_ENV"
            echo "YouTube 쿠키 사용"
          else
            echo "YT_COOKIES 미설정 — 쿠키 없이 시도"
          fi

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/dev-digest.db
          key: digest-db-${{ github.ref_name }}
          restore-keys: |
            digest-db-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: next-${{ hashFiles('web/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            next-${{ hashFiles('web/package-lock.json') }}-

      - name: Restore archives from gh-pages
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1 || exit 0
          git checkout origin/gh-pages -- data/archives/ 2>/dev/null || true

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL || 'https://jiehoonpark.github.io/development-digest/' }}
          LOG_LEVEL: info
        run: npx tsx src/index.ts

      - name: Upload digest HTML (dry run)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-html
          path: data/digest-*.html
          retention-days: 7

      - name: Build web (Next.js static export)
        if: github.event.inputs.dry_run != 'true'
        env:
          NEXT_PUBLIC_BASE_URL: ${{ secrets.SITE_BASE_URL || 'https://jiehoonpark.github.io/development-digest/' }}
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build
        working-directory: web

      - name: Persist archives inside web/out
        if: github.event.inputs.dry_run != 'true'
        run: |
          mkdir -p web/out/data/archives
          if [ -d data/archives ]; then
            cp -r data/archives/. web/out/data/archives/
          fi

      - name: Copy markdown to web/out
        if: github.event.inputs.dry_run != 'true' && hashFiles('data/markdown/**/*.md') != ''
        run: cp -r data/markdown web/out/markdown

      - name: Ensure .nojekyll
        if: github.event.inputs.dry_run != 'true'
        run: touch web/out/.nojekyll

      - name: Deploy to GitHub Pages
        if: github.event.inputs.dry_run != 'true' && hashFiles('web/out/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/out
          keep_files: true

      - name: Upload markdown (artifact)
        if: always() && hashFiles('data/markdown/**/*.md') != ''
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-markdown
          path: data/markdown/
          retention-days: 30

      # 앞 스텝이 하나라도 실패하면 실행 — 침묵 실패 방지.
      # RESEND_API_KEY/DIGEST_RECIPIENTS 는 뉴스레터 발송용을 그대로 재사용.
      - name: 파이프라인 실패 알림
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$RESEND_API_KEY" ] || [ -z "$DIGEST_RECIPIENTS" ]; then
            echo "RESEND_API_KEY 또는 DIGEST_RECIPIENTS 미설정 — 알림 건너뜀"
            exit 0
          fi
          TO_JSON=$(printf '%s' "$DIGEST_RECIPIENTS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')
          PAYLOAD=$(jq -n \
            --argjson to "$TO_JSON" \
            --arg subject "❌ FE 데일리 리포트 실패 ($(TZ=Asia/Seoul date +%Y-%m-%d))" \
            --arg html "<p>오늘 FE 데일리 리포트 파이프라인이 실패했습니다.</p><p><a href=\"$RUN_URL\">실행 로그 보기 →</a></p>" \
            '{from:"Dev Digest <onboarding@resend.dev>", to:$to, subject:$subject, html:$html}')
          curl -sS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
