name: Dev Digest

on:
  schedule:
    # UTC 23:00 (월~금) = KST 08:00
    - cron: "0 23 * * 0-4"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "DRY_RUN 모드 (true/false)"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/dev-digest.db
          key: digest-db-${{ github.ref_name }}
          restore-keys: |
            digest-db-

      - name: Restore archives from gh-pages
        continue-on-error: true
        run: |
          git fetch origin gh-pages --depth=1 || exit 0
          git checkout origin/gh-pages -- data/archives/ 2>/dev/null || true
          git checkout origin/gh-pages -- site/data/archives/ 2>/dev/null || true

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL || 'https://jiehoonpark.github.io/development-digest/' }}
          SKIP_TRANSLATION: ${{ secrets.SKIP_TRANSLATION || 'false' }}
          LOG_LEVEL: info
        run: npx tsx src/index.ts

      - name: Upload digest HTML (dry run)
        if: github.event.inputs.dry_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-html
          path: data/digest-*.html
          retention-days: 7

      - name: Deploy to GitHub Pages
        if: always() && hashFiles('site/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
